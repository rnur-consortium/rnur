name: RNUR Registry Integrity CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-registry:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5  # FIXED: Removed the incorrect /workflows/ path
      with:
        python-version: '3.x'

    - name: Run Global Database Overlap Check
      run: |
        python -c "
        import csv, sys, os
        
        def parse_hex(h):
            return int(h.upper().replace('U+', '').replace('0X', '').strip(), 16)
            
        def check_file(path):
            if not os.path.exists(path):
                print(f'[-] CRITICAL ERROR: {path} does not exist in the repository root.')
                sys.exit(1)
                
            print(f'Analyzing {path} for integrity...')
            allocated = []
            with open(path, 'r', encoding='utf-8') as f:
                reader = csv.DictReader(f)
                for line_num, row in enumerate(reader, start=2):
                    if row['Status'] == 'Waiting for Submissions':
                        continue
                    try:
                        s_set = int(row['Set_Number'])
                        start = parse_hex(row['Start_Code_Point'])
                        end = parse_hex(row['End_Code_Point'])
                        
                        for c_set, c_start, c_end, c_name, c_line in allocated:
                            if s_set == c_set and max(start, c_start) <= min(end, c_end):
                                print(f'[-] CRITICAL ERROR: Collision detected between Line {line_num} ({row[\"Script_Name\"]}) and Line {c_line} ({c_name})')
                                sys.exit(1)
                        allocated.append((s_set, start, end, row['Script_Name'], line_num))
                    except Exception as e:
                        print(f'[-] Malformed data on line {line_num}: {e}')
                        sys.exit(1)
            print(f'[+] {path} passed integrity verification cleanly.')
            
        check_file('data/set1_master.csv')
        check_file('data/set2_sandbox.csv')
        "
